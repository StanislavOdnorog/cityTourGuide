run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - sqlclosecheck
    - nilerr
    - gofmt
    - goimports
    - revive
    - misspell
    - unconvert
    - prealloc
    - gocritic
    - gosec

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: superfluous-else
      - name: unreachable-code
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  gosec:
    excludes:
      - G104
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/saas/city-stories-guide

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic
        - prealloc
    - path: doc\.go
      linters:
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
