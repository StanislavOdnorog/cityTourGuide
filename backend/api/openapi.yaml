      - name: cursor
        in: query
        description: Opaque cursor from previous response's next_cursor
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items per page (default 20, max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Paginated list of listening records
