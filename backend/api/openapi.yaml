          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Paginated list of stories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoriesPageResponse'
        '400':
          description: Missing or invalid poi_id, status, cursor, or limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorOrValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /stories/{id}:
    get:
      tags:
