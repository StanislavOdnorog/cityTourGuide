          format: int64
          example: 1048576
paths:
  /healthz:
    get:
      tags:
      - Health
      summary: Health check
      description: Returns 200 if the server is running.
      operationId: healthz
      servers:
      - url: /
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags:
      - Health
      summary: Readiness check
      description: Returns component-level readiness for required and optional dependencies. Required failures or shutdown mode return 503; optional failures are reported as degraded without forcing 503.
      operationId: readyz
      servers:
      - url: /
      responses:
        '200':
          description: Server is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessUnavailableResponse'
  /nearby-stories:
    get:
      tags:
      - Nearby
      summary: Get nearby stories
      description: 'Returns stories for POIs near the given coordinates, ranked by relevance.

        Rate limited to 10 requests/minute per IP.

        '
      operationId: getNearbyStories
      parameters:
      - name: lat
        in: query
        required: true
        description: Latitude (-90 to 90)
        schema:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 41.6941
      - name: lng
        in: query
        required: true
        description: Longitude (-180 to 180)
        schema:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 44.8337
      - name: radius
        in: query
        description: Search radius in meters (10–500, default 150)
        schema:
          type: number
          format: double
          minimum: 10
          maximum: 500
          default: 150
      - name: heading
        in: query
        description: User heading in degrees (-1 means unavailable)
        schema:
          type: number
          format: double
          default: -1
      - name: speed
        in: query
        description: User speed in m/s (≥0)
        schema:
          type: number
          format: double
          minimum: 0
          default: 0
      - name: language
        in: query
        description: Story language code
        schema:
          type: string
          default: en
      - name: user_id
        in: query
        description: Optional user identifier for personalization and listened-story deduplication
        schema:
          type: string
      responses:
        '200':
          description: List of story candidates sorted by relevance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyStoriesResponse'
              example:
                data:
                  - poi_id: 1
                    poi_name: Narikala Fortress
                    poi_lat: 41.6875
                    poi_lng: 44.8084
                    story_id: 5
                    story_text: "Standing on this ancient hill, you can almost hear the echoes of centuries past..."
                    audio_url: "https://storage.example.com/stories/5/en.mp3"
                    duration_sec: 120
                    distance_m: 45.2
                    score: 0.87
                  - poi_id: 3
                    poi_name: Abanotubani
                    poi_lat: 41.6878
                    poi_lng: 44.8103
                    story_id: 12
                    story_text: "The sulfur baths have drawn visitors for over a thousand years..."
                    audio_url: "https://storage.example.com/stories/12/en.mp3"
                    duration_sec: 95
                    distance_m: 120.8
                    score: 0.72
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "lat must be between -90 and 90"
                trace_id: "req-abc-123"
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "rate limit exceeded"
                trace_id: "req-def-456"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cities:
    get:
      tags:
      - Cities
      summary: List cities
      operationId: listCities
      parameters:
      - name: cursor
        in: query
        description: Opaque cursor from previous response's next_cursor
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items per page (default 20, max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Paginated list of cities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitiesPageResponse'
              example:
                items:
                  - id: 1
                    name: Tbilisi
                    name_ru: Тбилиси
                    country: Georgia
                    center_lat: 41.7151
                    center_lng: 44.8271
                    radius_km: 15.0
                    is_active: true
                    download_size_mb: 120.5
                    deleted_at: null
                    created_at: "2025-01-15T10:00:00Z"
                    updated_at: "2025-01-15T10:00:00Z"
                next_cursor: "aWQ6Mg=="
                has_more: true
        '400':
          description: Invalid cursor or limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "invalid cursor"
                trace_id: "req-abc-123"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cities/{id}:
    get:
      tags:
      - Cities
      summary: Get city by ID
      operationId: getCity
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '400':
          description: Invalid city ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: City details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponse'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cities/{id}/download-manifest:
    get:
      tags:
      - Cities
      summary: Get download manifest for offline mode
      description: Returns list of all audio files for a city to enable offline download.
      operationId: getCityDownloadManifest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: language
        in: query
        description: Story language
        schema:
          type: string
          default: en
          enum:
          - en
          - ru
      responses:
        '400':
          description: Invalid city ID or unsupported language
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Download manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadManifestResponse'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pois:
    get:
      tags:
      - POIs
      summary: List POIs
      operationId: listPOIs
      parameters:
      - name: city_id
        in: query
        required: true
        schema:
          type: integer
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - disabled
          - pending_review
      - name: type
        in: query
        schema:
          type: string
          enum:
          - building
          - street
          - park
          - monument
          - church
          - bridge
          - square
          - museum
          - district
          - other
      - name: cursor
        in: query
        description: Opaque cursor from previous response's next_cursor
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items per page (default 20, max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Paginated list of POIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POIsPageResponse'
        '400':
          description: Missing or invalid city_id, status, type, cursor, or limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorOrValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pois/{id}:
    get:
      tags:
      - POIs
      summary: Get POI by ID
      operationId: getPOI
      parameters:
      - name: id
        in: path
        required: true
